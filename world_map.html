<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 헥스 월드맵</title>
  <link rel="stylesheet" href="./assets/css/world_map.css" />
</head>
<body>
  <main class="map-screen">
    <header class="map-topbar">
      <button id="goBack" type="button" class="ghost-btn">← 시작 메뉴</button>
      <h1>Newtheria Hex World</h1>
      <div class="map-stats" id="mapStats" aria-live="polite"></div>
    </header>

    <section class="map-wrap" aria-label="헥스 월드맵">
      <canvas id="worldCanvas"></canvas>
    </section>

    <footer class="map-footer">
      <p>휠: 확대/축소 · 드래그: 이동 · 더블클릭: 배율 초기화</p>
      <p>ver.0.0.47(260331-헥스월드맵진입)</p>
    </footer>
  </main>

  <script src="./assets/js/world_map.js"></script>
</body>
</html>
