<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 월드맵 작성</title>
  <link rel="stylesheet" href="./assets/css/world_map_builder.css" />
</head>
<body>
  <main class="world-map-builder-screen">
    <header class="map-info-header">
      <p class="kicker">WORLD MAP BUILDER</p>
      <h1>월드맵 작성</h1>
      <p class="subtitle">여정의 무대를 정의할 정보를 선택하고, 카드로 월드맵 요소를 구성하세요.</p>

      <section class="map-info-grid" aria-label="맵 기본 정보">
        <article class="map-info-card">
          <h2>맵 이름</h2>
          <p id="mapNameMeta">미정 · 새 여정의 세계</p>
        </article>
        <article class="map-info-card">
          <h2>맵 스케일</h2>
          <p id="mapScaleMeta">중형 대륙 · 200x200 헥스 기준</p>
        </article>
        <article class="map-info-card">
          <h2>기후 기조</h2>
          <p id="mapClimateMeta">혼합 기후 · 균형형 시작값</p>
        </article>
      </section>

      <div class="header-actions">
        <a href="./start_screen.html">시작 화면으로</a>
        <a href="./world_map.html">기존 월드맵 미리보기</a>
      </div>

      <p id="worldMapBuilderVersion" class="version"></p>
    </header>

    <section class="component-tabs-section" aria-label="맵 구성 탭">
      <div id="componentTabs" class="component-tabs" role="tablist" aria-label="맵 구성 항목"></div>
    </section>

    <section class="component-options" aria-label="선택 가능한 구성 카드">
      <div id="componentCardList" class="component-card-grid"></div>
    </section>
  </main>

  <script src="./assets/js/card_templates.js"></script>
  <script src="./assets/js/world_map_builder.js"></script>
</body>
</html>
