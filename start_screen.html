<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <link rel="stylesheet" href="./assets/css/start_screen.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="screen">
    <header class="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="fan-zone" aria-label="시작 카드 선택지">
      <div class="card-fan-wrap center">
        <div class="card-fan" id="menu">
          <button class="card-fan-card" type="button" data-route="new">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="icon" aria-hidden="true">🧭</span><span class="label">새로운 여정</span><span class="desc">처음부터 새로운 세계를 시작합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
          <button class="card-fan-card" type="button" data-route="continue">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="icon" aria-hidden="true">📜</span><span class="label">어떤 모험가의 일지</span><span class="desc">기록된 여정을 이어서 진행합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
          <button class="card-fan-card" type="button" data-route="codex">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="icon" aria-hidden="true">📚</span><span class="label">대륙견문록</span><span class="desc">인물·지리·전승 문서를 열람합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
          <button class="card-fan-card" type="button" data-route="mods">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="icon" aria-hidden="true">⚙️</span><span class="label">신의 섭리</span><span class="desc">모드 및 확장 규칙을 조정합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
        </div>
      </div>
    </section>

    <footer class="meta">
      <button id="easterEgg" type="button">ver.0.0.69(260410-월드맵지형대비해변색상개선)</button>
    </footer>
  </main>

  <script src="./assets/js/start_screen.js"></script>
</body>
</html>
