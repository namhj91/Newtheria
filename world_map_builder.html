<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 월드맵 작성</title>
  <link rel="stylesheet" href="./assets/css/world_map_builder.css" />
</head>
<body>
  <main class="world-map-builder-screen">
    <header class="map-info" aria-label="맵 정보">
      <p class="kicker">WORLD MAP CREATION</p>
      <h1>월드맵 작성</h1>
      <p class="description">여정에 맞는 지도를 빠르게 설계하고, 선택한 구성을 바탕으로 생성 단계로 이동하세요.</p>
      <dl class="meta-grid">
        <div>
          <dt>맵 타입</dt>
          <dd>신규 월드 생성</dd>
        </div>
        <div>
          <dt>기준 스케일</dt>
          <dd>지상계(z=0) 200×200</dd>
        </div>
        <div>
          <dt>생성 모드</dt>
          <dd>카드 선택형 프리셋</dd>
        </div>
      </dl>
      <p id="worldMapBuilderVersion" class="version"></p>
    </header>

    <section class="map-tabs" aria-label="맵 구성 탭">
      <button type="button" class="tab-button is-active" data-tab="terrain">지형 테마</button>
      <button type="button" class="tab-button" data-tab="climate">기후 흐름</button>
      <button type="button" class="tab-button" data-tab="special">특수 포인트</button>
    </section>

    <section class="map-options" aria-live="polite" aria-label="맵 선택 카드">
      <div id="builderCardList" class="card-grid"></div>
    </section>

    <footer class="actions">
      <a href="./start_screen.html">시작 화면으로</a>
      <a href="./world_map.html">맵 생성 화면으로</a>
    </footer>
  </main>

  <script src="./assets/js/card_templates.js"></script>
  <script src="./assets/js/world_map_builder.js"></script>
</body>
</html>
