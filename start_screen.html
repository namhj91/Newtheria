<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <style>
    :root {
      --bg-1: #070b17;
      --bg-2: #16254e;
      --text: #e9efff;
      --card-w: min(22vw, 220px);
      --card-ratio: 1 / 1.618;
      --fan-gap: 92px;
      --fan-tilt: 13deg;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(62, 99, 196, 0.3), transparent 35%),
        radial-gradient(circle at 82% 10%, rgba(107, 59, 199, 0.22), transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }
    .stars, .twinkle, .overlay { position: fixed; inset: 0; pointer-events: none; }
    .stars::before, .stars::after, .twinkle::before, .twinkle::after {
      content: ""; position: absolute; inset: -20%; background-repeat: repeat; background-size: 300px 300px;
    }
    .stars::before { background-image: radial-gradient(circle, rgba(234, 243, 255, .9) 1px, transparent 2px); animation: drift 70s linear infinite; }
    .stars::after { background-image: radial-gradient(circle, rgba(146, 181, 255, .9) 1.2px, transparent 2px); animation: drift 95s linear infinite reverse; opacity: .45; }
    .twinkle::before { background-image: radial-gradient(circle, rgba(255, 255, 255, .9) 1px, transparent 2px); animation: pulse 5s ease-in-out infinite; }
    .twinkle::after { background-image: radial-gradient(circle, rgba(145, 179, 255, .7) 1px, transparent 2px); animation: pulse 8s ease-in-out infinite reverse; opacity: .55; }

    .screen { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 44px 24px 18px; }
    .logo { text-align: center; text-shadow: 0 0 24px rgba(136, 170, 255, .6); }
    .logo h1 { margin: 0; letter-spacing: .12em; font-size: clamp(2rem, 5.4vw, 4rem); }
    .logo p { margin: 10px 0 0; opacity: .8; letter-spacing: .12em; font-size: clamp(.82rem, 1.6vw, 1rem); }

    .fan-zone { position: relative; display: grid; place-items: center; }
    .menu {
      position: relative;
      width: min(980px, 96vw);
      height: min(62vh, 480px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      position: absolute;
      width: var(--card-w);
      aspect-ratio: var(--card-ratio);
      border-radius: 16px;
      border: 1px solid rgba(180, 202, 255, .6);
      background: linear-gradient(165deg, rgba(30, 43, 88, 1), rgba(18, 27, 57, 1));
      color: var(--text);
      box-shadow: 0 14px 26px rgba(0,0,0,.34);
      padding: 18px 16px;
      text-align: left;
      cursor: pointer;
      transform-origin: 50% 86%;
      transition: transform .25s ease, box-shadow .25s ease, filter .25s ease, opacity .25s ease;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      user-select: none;
      touch-action: none;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(184, 205, 255, 0.2);
      pointer-events: none;
    }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 18px 16px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .card-front {
      background: linear-gradient(165deg, rgba(30, 43, 88, 1), rgba(18, 27, 57, 1));
    }
    .card-back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 50% 30%, rgba(205, 224, 255, .24), transparent 40%),
        repeating-radial-gradient(circle at center, rgba(168, 197, 255, .2) 0 8px, rgba(30, 46, 89, .35) 8px 16px),
        linear-gradient(155deg, rgba(31, 43, 82, 1), rgba(19, 28, 54, 1));
      border: 1px solid rgba(177, 204, 255, .46);
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .card-back::before {
      content: "✦";
      font-size: 2.4rem;
      color: rgba(232, 242, 255, .92);
      text-shadow: 0 0 14px rgba(138, 176, 255, .85);
    }
    .card-back::after {
      content: "";
      width: 65%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(215, 232, 255, .75), transparent);
      border-radius: 999px;
    }
    .card .icon {
      font-size: 1.45rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 8px rgba(148, 190, 255, .4));
    }
    .card .label { display: block; font-size: 1.08rem; font-weight: 700; margin-bottom: 10px; }
    .card .desc { font-size: .89rem; line-height: 1.45; opacity: .84; }

    .card:hover, .card:focus-visible {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) translateY(-12px) scale(1.04);
      box-shadow: 0 0 26px rgba(127,162,255,.45), 0 16px 28px rgba(0,0,0,.3);
      outline: none;
      z-index: 10;
    }

    .menu.selecting .card:not(.active) { opacity: .32; filter: saturate(.65); }
    .menu.selecting .card.active {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) translateY(-18px) scale(1.07);
      box-shadow: 0 0 30px rgba(145,183,255,.52), 0 16px 30px rgba(0,0,0,.35);
      z-index: 11;
    }

    .menu.rerolling .card { pointer-events: none; }

    .meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-size: .86rem;
      opacity: .9;
    }
    .meta button {
      border: 0;
      color: #dbe6ff;
      background: transparent;
      cursor: pointer;
      padding: 4px 2px;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      white-space: normal;
      text-align: center;
      max-width: 100%;
    }


    .overlay.play { background: radial-gradient(circle at center, rgba(255,255,255,.09) 0, rgba(3,7,18,.58) 70%); }

    @keyframes drift { from { transform: translate3d(0,0,0);} to { transform: translate3d(-240px,-170px,0);} }
    @keyframes pulse { 0%,100%{opacity:.38;} 50%{opacity:.92;} }

    @media (max-width: 760px) {
      :root { --card-w: min(38vw, 184px); --fan-gap: 52px; --fan-tilt: 9deg; }
      .menu { height: min(58vh, 420px); }
      .screen { padding: 34px 14px 12px; }
      .meta { font-size: .8rem; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="screen">
    <header class="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="fan-zone" aria-label="시작 카드 선택지">
      <div class="menu" id="menu">
        <button class="card" type="button" data-route="new">
          <span class="card-face card-front"><span class="icon" aria-hidden="true">🧭</span><span class="label">새로운 여정</span><span class="desc">처음부터 새로운 세계를 시작합니다.</span></span>
          <span class="card-face card-back" aria-hidden="true"></span>
        </button>
        <button class="card" type="button" data-route="continue">
          <span class="card-face card-front"><span class="icon" aria-hidden="true">📜</span><span class="label">어떤 모험가의 일지</span><span class="desc">기록된 여정을 이어서 진행합니다.</span></span>
          <span class="card-face card-back" aria-hidden="true"></span>
        </button>
        <button class="card" type="button" data-route="codex">
          <span class="card-face card-front"><span class="icon" aria-hidden="true">🗺️</span><span class="label">대륙견문록</span><span class="desc">인물·지리·전승 문서를 열람합니다.</span></span>
          <span class="card-face card-back" aria-hidden="true"></span>
        </button>
        <button class="card" type="button" data-route="mods">
          <span class="card-face card-front"><span class="icon" aria-hidden="true">⚙️</span><span class="label">신의 섭리</span><span class="desc">모드 및 확장 규칙을 조정합니다.</span></span>
          <span class="card-face card-back" aria-hidden="true"></span>
        </button>
      </div>
    </section>

    <footer class="meta">
      <button id="easterEgg" type="button">ver.0.0.28(260329-카드셔플드래그연출강화)</button>
    </footer>
  </main>


  <script>
    const menu = document.getElementById('menu');
    const cards = [...menu.querySelectorAll('.card')];
    const overlay = document.querySelector('.overlay');
    const eggButton = document.getElementById('easterEgg');
    const dragState = {
      card: null,
      pointerId: null,
      startX: 0,
      startY: 0,
      moved: false
    };

    const layoutCards = () => {
      const mid = (cards.length - 1) / 2;
      cards.forEach((card, i) => {
        const offset = i - mid;
        const tx = offset * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fan-gap'));
        const ty = Math.abs(offset) * 14;
        const rot = offset * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fan-tilt'));
        card.style.setProperty('--tx', `${tx}px`);
        card.style.setProperty('--ty', `${ty}px`);
        card.style.setProperty('--rot', `${rot}deg`);
        card.dataset.homeTransform = `translate(${tx}px, ${ty}px) rotate(${rot}deg) rotateY(0deg)`;
        card.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
      });
    };


    menu.addEventListener('click', (e) => {
      const card = e.target.closest('.card');
      if (!card || menu.classList.contains('rerolling')) return;
      if (card.dataset.dragged === 'true') return;
      menu.classList.add('selecting');
      cards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      overlay.classList.add('play');
      setTimeout(() => overlay.classList.remove('play'), 620);
    });

    const playReroll = async () => {
      if (menu.classList.contains('rerolling')) return;
      menu.classList.remove('selecting');
      cards.forEach(c => c.classList.remove('active'));
      menu.classList.add('rerolling');
      cards.forEach(card => {
        card.style.transition = 'none';
        card.style.transform = card.dataset.homeTransform || card.style.transform;
      });

      const stackX = 0;
      const stackY = -6;
      const stackSpread = 6;

      // 1) Collect
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: card.dataset.homeTransform || card.style.transform },
        { transform: `translate(${stackX + (i - 1.5) * stackSpread}px, ${stackY}px) rotate(0deg) rotateY(0deg)` }
      ], { duration: 260, easing: 'ease-in' }).finished));

      // 2) Stack flip
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: `translate(${stackX + (i - 1.5) * stackSpread}px, ${stackY}px) rotate(0deg) rotateY(0deg)` },
        { transform: `translate(${stackX + (i - 1.5) * stackSpread}px, ${stackY}px) rotate(0deg) rotateY(180deg)` }
      ], { duration: 220, easing: 'ease-in-out' }).finished));

      // 3) 3x clockwise/counterclockwise spin while stacked
      await Promise.all(cards.map((card, i) => {
        const direction = i % 2 === 0 ? 1 : -1;
        return card.animate([
          { transform: `translate(${stackX + (i - 1.5) * stackSpread}px, ${stackY}px) rotate(0deg) rotateY(180deg)` },
          { transform: `translate(${stackX + (i - 1.5) * stackSpread}px, ${stackY}px) rotate(${direction * 1080}deg) rotateY(180deg)` }
        ], { duration: 760, easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }).finished;
      }));

      // 4) Move to each home position (still back side)
      layoutCards();
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: `translate(${stackX + (i - 1.5) * stackSpread}px, ${stackY}px) rotate(0deg) rotateY(180deg)` },
        { transform: `translate(${card.style.getPropertyValue('--tx')}, ${card.style.getPropertyValue('--ty')}) rotate(${card.style.getPropertyValue('--rot')}) rotateY(180deg)` }
      ], { duration: 320 + i * 46, easing: 'ease-out' }).finished));

      // 5) Flip to front one by one
      for (let i = 0; i < cards.length; i += 1) {
        const card = cards[i];
        await card.animate([
          { transform: `translate(${card.style.getPropertyValue('--tx')}, ${card.style.getPropertyValue('--ty')}) rotate(${card.style.getPropertyValue('--rot')}) rotateY(180deg)` },
          { transform: `translate(${card.style.getPropertyValue('--tx')}, ${card.style.getPropertyValue('--ty')}) rotate(${card.style.getPropertyValue('--rot')}) rotateY(0deg)` }
        ], { duration: 190, easing: 'ease-in-out' }).finished;
      }

      menu.classList.remove('rerolling');
      layoutCards();
    };

    const handlePointerDown = (e) => {
      const card = e.target.closest('.card');
      if (!card || menu.classList.contains('rerolling')) return;
      dragState.card = card;
      dragState.pointerId = e.pointerId;
      dragState.startX = e.clientX;
      dragState.startY = e.clientY;
      dragState.moved = false;
      card.setPointerCapture(e.pointerId);
      card.style.transition = 'none';
      card.style.zIndex = '20';
    };

    const handlePointerMove = (e) => {
      if (!dragState.card || dragState.pointerId !== e.pointerId) return;
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      if (Math.hypot(dx, dy) > 4) dragState.moved = true;
      dragState.card.style.transform = `${dragState.card.dataset.homeTransform || dragState.card.style.transform} translate(${dx}px, ${dy}px)`;
    };

    const releaseDrag = (e) => {
      if (!dragState.card || dragState.pointerId !== e.pointerId) return;
      const card = dragState.card;
      card.releasePointerCapture(e.pointerId);
      card.style.transition = 'transform .4s cubic-bezier(0.22, 1, 0.36, 1)';
      card.style.transform = card.dataset.homeTransform || card.style.transform;
      card.style.zIndex = '';
      if (dragState.moved) {
        card.dataset.dragged = 'true';
        setTimeout(() => {
          card.dataset.dragged = 'false';
        }, 20);
      }
      dragState.card = null;
      dragState.pointerId = null;
      dragState.moved = false;
    };

    menu.addEventListener('pointerdown', handlePointerDown);
    menu.addEventListener('pointermove', handlePointerMove);
    menu.addEventListener('pointerup', releaseDrag);
    menu.addEventListener('pointercancel', releaseDrag);
    menu.addEventListener('lostpointercapture', releaseDrag);

    eggButton.addEventListener('click', playReroll);
    window.addEventListener('resize', layoutCards);
    layoutCards();
  </script>
</body>
</html>
