<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <style>
    :root {
      --bg-1: #070b17;
      --bg-2: #16254e;
      --text: #e9efff;
      --card-w: min(22vw, 220px);
      --card-ratio: 1 / 1.618;
      --fan-gap: 92px;
      --fan-tilt: 13deg;
      --stars-a: radial-gradient(circle at 18% 30%, rgba(234, 243, 255, .92) 0 1.3px, transparent 2.5px);
      --stars-b: radial-gradient(circle at 82% 60%, rgba(158, 189, 255, .8) 0 1.6px, transparent 3px);
      --twinkle-a: radial-gradient(circle at 35% 75%, rgba(255, 255, 255, .9) 0 1.8px, transparent 3px);
      --twinkle-b: radial-gradient(circle at 64% 22%, rgba(164, 190, 255, .82) 0 1.7px, transparent 2.9px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(62, 99, 196, 0.3), transparent 35%),
        radial-gradient(circle at 82% 10%, rgba(107, 59, 199, 0.22), transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }
    .stars, .twinkle, .overlay { position: fixed; inset: 0; pointer-events: none; }
    .stars::before, .stars::after, .twinkle::before, .twinkle::after {
      content: ""; position: absolute; inset: -20%; background-repeat: no-repeat; background-size: cover;
    }
    .stars::before { background-image: var(--stars-a); animation: drift 68s linear infinite; }
    .stars::after { background-image: var(--stars-b); animation: drift 92s linear infinite reverse; opacity: .58; }
    .twinkle::before { background-image: var(--twinkle-a); animation: pulse 4.4s ease-in-out infinite; }
    .twinkle::after { background-image: var(--twinkle-b); animation: pulse 7.2s ease-in-out infinite reverse; opacity: .62; }

    .screen { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 44px 24px 18px; }
    .logo { text-align: center; text-shadow: 0 0 24px rgba(136, 170, 255, .6); }
    .logo h1 { margin: 0; letter-spacing: .12em; font-size: clamp(2rem, 5.4vw, 4rem); }
    .logo p { margin: 10px 0 0; opacity: .8; letter-spacing: .12em; font-size: clamp(.82rem, 1.6vw, 1rem); }

    .fan-zone { position: relative; display: grid; place-items: center; width: 100%; }
    .card-fan-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .card-fan {
      position: relative;
      width: min(980px, 96vw);
      height: min(62vh, 480px);
      perspective: 1600px;
    }

    .card-fan-card {
      position: absolute;
      width: var(--card-w);
      aspect-ratio: var(--card-ratio);
      border-radius: 16px;
      border: 0;
      background: transparent;
      color: var(--text);
      box-shadow: none;
      cursor: pointer;
      transform-origin: 50% 50%;
      transition: transform .28s cubic-bezier(0.18, 0.78, 0.34, 1), box-shadow .25s ease, filter .25s ease, opacity .25s ease;
      transform-style: preserve-3d;
      touch-action: none;
      user-select: none;
      transform: var(--base-transform, translate(0px, 0px) rotate(0deg));
      overflow: visible;
    }
    .card-fan-card::after {
      content: none;
    }
    .card-fan-card-spin,
    .card-fan-card-inner {
      display: block;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }
    .card-fan-card-inner {
      transition: transform 360ms cubic-bezier(0.18, 0.86, 0.32, 1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 14px 26px rgba(0,0,0,.34);
    }
    .card-fan-card.is-flipped .card-fan-card-inner {
      transform: rotateY(180deg);
    }
    .card-fan-card-face {
      position: absolute !important;
      inset: 0;
      border-radius: 16px;
      border: 1px solid rgba(180, 202, 255, .6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 18px 16px;
      text-align: left;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-fan-card-face::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(184, 205, 255, 0.16);
      pointer-events: none;
    }
    .card-fan-front {
      background: linear-gradient(165deg, rgba(30, 43, 88, 1), rgba(18, 27, 57, 1));
      transform: rotateY(0deg);
    }
    .card-fan-back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 28% 24%, rgba(77, 213, 255, .24), transparent 44%),
        radial-gradient(circle at 72% 76%, rgba(129, 140, 248, .26), transparent 42%),
        linear-gradient(160deg, #0a1b34 0%, #091325 48%, #050a17 100%);
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .card-fan-back .sigil {
      display: block;
      font-size: 2rem;
      line-height: 1;
      color: #8be9ff;
      text-shadow: 0 0 16px rgba(56, 189, 248, .45);
      margin-bottom: 10px;
    }
    .card-fan-back .brand {
      display: block;
      font-size: .92rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(226, 241, 255, .94);
      font-weight: 700;
    }
    .card-fan-back .orbit {
      position: absolute;
      inset: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 223, 255, .28);
      pointer-events: none;
    }
    .card-fan-card .label { display: block; font-size: 1.08rem; font-weight: 700; margin-bottom: 10px; }
    .card-fan-card .desc { font-size: .89rem; line-height: 1.45; opacity: .84; }

    .card-fan-card:hover, .card-fan-card:focus-visible {
      transform: var(--base-transform, translate(0px, 0px) rotate(0deg)) translateY(-12px) scale(1.04);
      box-shadow: 0 0 26px rgba(127,162,255,.45), 0 16px 28px rgba(0,0,0,.3);
      outline: none;
      z-index: 10;
    }

    .card-fan.selecting .card-fan-card:not(.active) { opacity: .32; filter: saturate(.65); }
    .card-fan.selecting .card-fan-card.active {
      transform: var(--base-transform, translate(0px, 0px) rotate(0deg)) translateY(-18px) scale(1.07);
      box-shadow: 0 0 30px rgba(145,183,255,.52), 0 16px 30px rgba(0,0,0,.35);
      z-index: 11;
    }

    .card-fan.rerolling .card-fan-card { pointer-events: none; }
    .card-fan-card.dragging {
      transition: none;
      z-index: 30;
      box-shadow: 0 0 26px rgba(127,162,255,.45), 0 16px 28px rgba(0,0,0,.3);
    }

    .meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-size: .86rem;
      opacity: .9;
    }
    .meta button {
      border: 0;
      color: #dbe6ff;
      background: transparent;
      cursor: pointer;
      padding: 4px 2px;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      white-space: normal;
      text-align: center;
      max-width: 100%;
    }


    .overlay.play { background: radial-gradient(circle at center, rgba(255,255,255,.09) 0, rgba(3,7,18,.58) 70%); }

    @keyframes drift { from { transform: translate3d(0,0,0);} to { transform: translate3d(-240px,-170px,0);} }
    @keyframes pulse { 0%,100%{opacity:.38;} 50%{opacity:.92;} }

    @media (max-width: 760px) {
      :root { --card-w: min(38vw, 184px); --fan-gap: 52px; --fan-tilt: 9deg; }
      .card-fan { height: min(58vh, 420px); }
      .screen { padding: 34px 14px 12px; }
      .meta { font-size: .8rem; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="screen">
    <header class="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="fan-zone" aria-label="시작 카드 선택지">
      <div class="card-fan-wrap center">
        <div class="card-fan" id="menu">
          <button class="card-fan-card" type="button" data-route="new">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="label">새로운 여정</span><span class="desc">처음부터 새로운 세계를 시작합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
          <button class="card-fan-card" type="button" data-route="continue">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="label">어떤 모험가의 일지</span><span class="desc">기록된 여정을 이어서 진행합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
          <button class="card-fan-card" type="button" data-route="codex">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="label">대륙견문록</span><span class="desc">인물·지리·전승 문서를 열람합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
          <button class="card-fan-card" type="button" data-route="mods">
            <span class="card-fan-card-spin"><span class="card-fan-card-inner"><span class="card-fan-card-face card-fan-front"><span class="label">신의 섭리</span><span class="desc">모드 및 확장 규칙을 조정합니다.</span></span><span class="card-fan-card-face card-fan-back"><span class="orbit"></span><span class="sigil">✦</span><span class="brand">AetheriA</span></span></span></span>
          </button>
        </div>
      </div>
    </section>

    <footer class="meta">
      <button id="easterEgg" type="button">ver.0.0.37(260331-카드뒷면에테리아디자인)</button>
    </footer>
  </main>


  <script>
    const menu = document.getElementById('menu');
    let cards = [...menu.querySelectorAll('.card-fan-card')];
    const overlay = document.querySelector('.overlay');
    const eggButton = document.getElementById('easterEgg');
    const rootStyle = document.documentElement.style;
    const dragState = {
      pointerId: null,
      card: null,
      startX: 0,
      startY: 0,
      offsetX: 0,
      offsetY: 0,
      moved: false
    };

    const layoutCards = () => {
      const mid = (cards.length - 1) / 2;
      cards.forEach((card, i) => {
        const offset = i - mid;
        const tx = offset * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fan-gap'));
        const ty = Math.abs(offset) * 14;
        const rot = offset * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fan-tilt'));
        card.style.setProperty('--tx', `${tx}px`);
        card.style.setProperty('--ty', `${ty}px`);
        card.style.setProperty('--rot', `${rot}deg`);
        card.dataset.baseTransform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
        card.style.transform = card.dataset.baseTransform;
        card.style.zIndex = String(100 + (cards.length - i));
      });
    };

    const randomBetween = (min, max) => Math.random() * (max - min) + min;

    const createStarLayer = ({ count, minRadius, maxRadius, alphaMin, alphaMax, palette }) => {
      const gradients = [];
      for (let i = 0; i < count; i += 1) {
        const x = randomBetween(0, 100).toFixed(2);
        const y = randomBetween(0, 100).toFixed(2);
        const radius = randomBetween(minRadius, maxRadius);
        const fadeRadius = radius + randomBetween(0.9, 1.8);
        const alpha = randomBetween(alphaMin, alphaMax).toFixed(2);
        const color = palette[Math.floor(Math.random() * palette.length)];
        gradients.push(`radial-gradient(circle at ${x}% ${y}%, rgba(${color}, ${alpha}) 0 ${radius.toFixed(2)}px, transparent ${fadeRadius.toFixed(2)}px)`);
      }
      return gradients.join(', ');
    };

    const applyStarField = () => {
      rootStyle.setProperty('--stars-a', createStarLayer({
        count: 210,
        minRadius: 0.35,
        maxRadius: 1.35,
        alphaMin: 0.46,
        alphaMax: 0.94,
        palette: ['233, 242, 255', '214, 229, 255', '190, 214, 255']
      }));
      rootStyle.setProperty('--stars-b', createStarLayer({
        count: 160,
        minRadius: 0.45,
        maxRadius: 1.55,
        alphaMin: 0.36,
        alphaMax: 0.88,
        palette: ['178, 205, 255', '154, 187, 255', '133, 168, 245']
      }));
      rootStyle.setProperty('--twinkle-a', createStarLayer({
        count: 84,
        minRadius: 0.55,
        maxRadius: 1.95,
        alphaMin: 0.5,
        alphaMax: 0.98,
        palette: ['255, 255, 255', '238, 246, 255']
      }));
      rootStyle.setProperty('--twinkle-b', createStarLayer({
        count: 74,
        minRadius: 0.6,
        maxRadius: 2.15,
        alphaMin: 0.42,
        alphaMax: 0.86,
        palette: ['184, 208, 255', '163, 190, 252', '146, 177, 248']
      }));
    };

    const shuffleCardOrder = () => {
      for (let i = cards.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      cards.forEach((card) => menu.appendChild(card));
    };


    menu.addEventListener('click', (e) => {
      const card = e.target.closest('.card-fan-card');
      if (!card || menu.classList.contains('rerolling')) return;
      menu.classList.add('selecting');
      cards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      overlay.classList.add('play');
      setTimeout(() => overlay.classList.remove('play'), 620);
    });

    const playReroll = async () => {
      if (menu.classList.contains('rerolling')) return;
      menu.classList.remove('selecting');
      cards.forEach(c => c.classList.remove('active'));
      menu.classList.add('rerolling');

      // 1) Flip cards to the back before shuffling
      cards.forEach((card) => card.classList.add('is-flipped'));
      await Promise.all(cards.map((card) => {
        const inner = card.querySelector('.card-fan-card-inner');
        return inner.animate([
          { transform: 'rotateY(0deg)' },
          { transform: 'rotateY(180deg)' }
        ], { duration: 280, easing: 'ease-in-out' }).finished;
      }));

      // 2) Collect to center as an overlapped, slightly messy deck
      const stackTransforms = cards.map((_, i) => {
        const direction = i % 2 === 0 ? 1 : -1;
        const tx = Math.round((Math.random() * 20 + 4) * direction);
        const ty = Math.round(Math.random() * 18 - 9);
        const rot = ((Math.random() * 6) - 3).toFixed(2);
        return `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
      });

      await Promise.all(cards.map((card, i) => card.animate([
        { transform: card.dataset.baseTransform },
        { transform: stackTransforms[i] }
      ], { duration: 360, easing: 'cubic-bezier(0.16, 0.84, 0.44, 1)' }).finished));
      cards.forEach((card, i) => { card.style.transform = stackTransforms[i]; });

      // 3) Rotate each card around its center (3 turns, alternating direction)
      await Promise.all(cards.map((card, i) => {
        const spinLayer = card.querySelector('.card-fan-card-spin');
        const direction = i % 2 === 0 ? 1 : -1;
        return spinLayer.animate([
          { transform: 'rotate(0deg)' },
          { transform: `rotate(${direction * 1080}deg)` }
        ], { duration: 780, easing: 'cubic-bezier(0.3, 0.08, 0.3, 1)' }).finished;
      }));

      // 4) Shuffle and spread to fan layout (cards stay back-facing)
      shuffleCardOrder();
      layoutCards();
      await Promise.all(cards.map((card, i) => {
        const target = card.dataset.baseTransform;
        return card.animate([
          { transform: stackTransforms[i] },
          { transform: target }
        ], { duration: 420 + i * 40, easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }).finished;
      }));

      // 5) Flip back to front one by one after shuffle
      for (const card of cards) {
        const inner = card.querySelector('.card-fan-card-inner');
        await inner.animate([
          { transform: 'rotateY(180deg)' },
          { transform: 'rotateY(0deg)' }
        ], { duration: 200, easing: 'ease-in-out' }).finished;
        card.classList.remove('is-flipped');
        card.style.transform = card.dataset.baseTransform;
      }

      menu.classList.remove('rerolling');
    };

    const resetDraggedCard = (card) => {
      card.classList.remove('dragging');
      card.style.transition = 'transform .4s cubic-bezier(0.18, 0.9, 0.35, 1.2)';
      card.style.transform = card.dataset.baseTransform;
      window.setTimeout(() => {
        card.style.transition = '';
      }, 420);
    };

    const onPointerMove = (e) => {
      if (!dragState.card || dragState.pointerId !== e.pointerId) return;
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      if (Math.hypot(dx, dy) > 5) dragState.moved = true;
      dragState.card.style.transform = `translate(${dragState.offsetX + dx}px, ${dragState.offsetY + dy}px) rotate(0deg)`;
    };

    const onPointerUp = (e) => {
      if (!dragState.card || dragState.pointerId !== e.pointerId) return;
      const card = dragState.card;
      card.releasePointerCapture(e.pointerId);
      resetDraggedCard(card);
      dragState.pointerId = null;
      dragState.card = null;
    };

    cards.forEach((card) => {
      card.addEventListener('pointerdown', (e) => {
        if (menu.classList.contains('rerolling')) return;
        dragState.pointerId = e.pointerId;
        dragState.card = card;
        dragState.startX = e.clientX;
        dragState.startY = e.clientY;
        dragState.offsetX = parseFloat(card.style.getPropertyValue('--tx')) || 0;
        dragState.offsetY = parseFloat(card.style.getPropertyValue('--ty')) || 0;
        dragState.moved = false;
        card.classList.add('dragging');
        card.setPointerCapture(e.pointerId);
      });
      card.addEventListener('pointermove', onPointerMove);
      card.addEventListener('pointerup', onPointerUp);
      card.addEventListener('pointercancel', onPointerUp);
      card.addEventListener('click', (e) => {
        if (dragState.moved) {
          e.preventDefault();
          e.stopPropagation();
          dragState.moved = false;
        }
      });
    });

    eggButton.addEventListener('click', playReroll);
    window.addEventListener('resize', layoutCards);
    applyStarField();
    layoutCards();
  </script>
</body>
</html>
