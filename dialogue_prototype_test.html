<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대화 프로토타입 임시 테스트</title>
  <link rel="stylesheet" href="./assets/css/dialogue_prototype.css" />
  <style>
    body { margin: 0; background: #070b17; color: #f2f4ff; font-family: "Pretendard", "Noto Sans KR", sans-serif; }
    .test-controls {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 60;
      display: grid;
      gap: 8px;
      width: min(420px, calc(100vw - 24px));
      padding: 12px;
      border-radius: 12px;
      background: rgba(8, 12, 24, 0.84);
      border: 1px solid rgba(152, 174, 255, 0.28);
      backdrop-filter: blur(8px);
    }
    .test-controls label { font-size: 0.85rem; opacity: 0.9; }
    .test-controls input, .test-controls button, .test-controls textarea {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(152, 174, 255, 0.35);
      background: rgba(22, 30, 56, 0.8);
      color: inherit;
    }
    .test-controls textarea {
      min-height: 120px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.4;
    }
    .test-controls button { cursor: pointer; }
    .test-controls details {
      border: 1px solid rgba(152, 174, 255, 0.25);
      border-radius: 10px;
      padding: 8px;
      background: rgba(12, 19, 38, 0.42);
    }
    .test-controls summary {
      cursor: pointer;
      font-size: 0.84rem;
      margin-bottom: 8px;
    }
    .test-controls .group { display: grid; gap: 8px; }
    .test-controls .hint { font-size: 0.78rem; opacity: 0.72; line-height: 1.35; }
    .test-controls .row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }
    .test-controls .row > * {
      min-width: 0;
    }
    .test-controls code { font-size: 0.78rem; }
    .test-controls__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .test-controls__title {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.01em;
    }
    .test-controls__toggle {
      width: auto;
      min-width: 98px;
      padding: 6px 10px;
      font-size: 0.78rem;
    }
    .test-controls__content {
      display: grid;
      gap: 8px;
    }
    .test-controls.is-minimized {
      width: auto;
      min-width: 180px;
      max-width: calc(100vw - 24px);
    }
    .test-controls.is-minimized .test-controls__content {
      display: none;
    }
  </style>
</head>
<body>
  <section class="test-controls is-minimized" id="testControlsPanel">
    <div class="test-controls__header">
      <h2 class="test-controls__title">대화 테스트 설정</h2>
      <button id="toggleControls" class="test-controls__toggle" type="button" aria-expanded="false">열기</button>
    </div>

    <div class="test-controls__content">
      <label for="csvUrl">CSV URL</label>
      <input id="csvUrl" type="text" value="./assets/data/dialogue_sample.csv" />

      <details open>
        <summary>대화 앵커/태그 설정 접기</summary>
        <div class="group">
          <div class="row">
            <div>
              <label for="sceneTag">scene/tag (예: intro, chapter1)</label>
              <input id="sceneTag" type="text" value="intro" />
            </div>
            <div>
              <label for="anchorId">anchor (예: start, choice)</label>
              <input id="anchorId" type="text" value="start" />
            </div>
          </div>

          <button id="reloadFromUrl" type="button">조건으로 다시 불러오기</button>
        </div>
      </details>

      <label for="backgroundUrl">기본 배경 URL(비우면 CSV 열 우선)</label>
      <input id="backgroundUrl" type="text" value="https://picsum.photos/id/1015/1920/1080" />

      <label for="csvFile">CSV 파일 직접 선택(.csv)</label>
      <input id="csvFile" type="file" accept=".csv,text/csv" />

      <details>
        <summary>변수 추적기 (디버그)</summary>
        <div class="group">
          <label for="variablePatch">변수 변경(JSON)</label>
          <textarea id="variablePatch" placeholder='{"신뢰도": 10, "playerName": "순례자"}'></textarea>
          <div class="row">
            <button id="applyVariablePatch" type="button">변수 적용</button>
            <button id="clearTrace" type="button">추적 로그 초기화</button>
          </div>
          <label for="variableSnapshot">현재 변수 상태</label>
          <textarea id="variableSnapshot" readonly></textarea>
          <label for="traceSnapshot">최근 이벤트 로그</label>
          <textarea id="traceSnapshot" readonly></textarea>
        </div>
      </details>

      <p class="hint">CSV 단일 문법(권장): <code>태그</code>, <code>앵커</code>, <code>화자</code>, <code>대사</code>, <code>배경</code>, <code>변수</code>, <code>선택지</code>, <code>히든선택지</code><br/>선택지 문법: <code>라벨 =&gt; scene#anchor</code>를 기본으로 쓰고, 여러 개는 <code>||</code>로 연결<br/>변수 문법: <code>변수 = playerName=여행자;title=별의방문자</code>, 대사/선택지에서 <code>{{playerName}}</code>, <code>{{상대이름}}</code> 사용</p>
    </div>
  </section>

  <div id="prototypeMount"></div>

  <script src="./assets/js/card_templates.js"></script>
  <script src="./assets/js/dialogue_prototype.js"></script>
  <script>
    const mount = document.getElementById('prototypeMount');
    const csvUrlInput = document.getElementById('csvUrl');
    const sceneTagInput = document.getElementById('sceneTag');
    const anchorIdInput = document.getElementById('anchorId');
    const backgroundInput = document.getElementById('backgroundUrl');
    const csvFileInput = document.getElementById('csvFile');
    const reloadButton = document.getElementById('reloadFromUrl');
    const variablePatchInput = document.getElementById('variablePatch');
    const applyVariablePatchButton = document.getElementById('applyVariablePatch');
    const clearTraceButton = document.getElementById('clearTrace');
    const variableSnapshot = document.getElementById('variableSnapshot');
    const traceSnapshot = document.getElementById('traceSnapshot');
    const controlsPanel = document.getElementById('testControlsPanel');
    const toggleControlsButton = document.getElementById('toggleControls');

    const getFilters = () => ({
      sceneTag: sceneTagInput.value.trim(),
      anchorId: anchorIdInput.value.trim()
    });

    const prototype = window.NewtheriaDialoguePrototype.createDialoguePrototype({
      mount,
      csvUrl: csvUrlInput.value,
      ...getFilters(),
      backgroundUrl: backgroundInput.value,
      onSkip: () => {
        alert('SKIP 클릭됨 (테스트)');
      },
      onError: (error) => {
        console.error(error);
      }
    });

    // 변수/분기 상태를 테스트 화면에서 즉시 확인할 수 있도록 추적 패널을 연결한다.
    const renderDebugSnapshot = (state = {}) => {
      const safeVariables = state.variables || {};
      const safeTrace = Array.isArray(state.trace) ? state.trace : [];
      variableSnapshot.value = JSON.stringify(safeVariables, null, 2);
      traceSnapshot.value = safeTrace
        .slice(-20)
        .map((entry) => `[${entry.at}] ${entry.type} ${JSON.stringify(entry.payload || {})}`)
        .join('\n');
    };
    prototype.subscribeDebug(renderDebugSnapshot);

    reloadButton.addEventListener('click', async () => {
      await prototype.loadFromCsvUrl(csvUrlInput.value, getFilters());
    });

    applyVariablePatchButton.addEventListener('click', () => {
      try {
        const rawValue = variablePatchInput.value.trim();
        if (!rawValue) return;
        const parsed = JSON.parse(rawValue);
        prototype.setVariables(parsed);
      } catch (error) {
        alert(`변수 JSON 파싱 실패: ${error.message}`);
      }
    });

    clearTraceButton.addEventListener('click', () => {
      prototype.clearDebugTrace();
    });

    // 대화 테스트 패널 전체를 최소화/복원한다.
    // 요청사항대로 "앵커/태그 영역만"이 아니라 CSV URL/파일/헤더 힌트까지 전체를 접는다.
    toggleControlsButton.addEventListener('click', () => {
      const nextMinimized = !controlsPanel.classList.contains('is-minimized');
      controlsPanel.classList.toggle('is-minimized', nextMinimized);
      toggleControlsButton.textContent = nextMinimized ? '열기' : '최소화';
      toggleControlsButton.setAttribute('aria-expanded', String(!nextMinimized));
    });

    csvFileInput.addEventListener('change', async (event) => {
      const [file] = event.target.files;
      if (!file) return;
      await prototype.loadFromCsvFile(file, getFilters());
    });
  </script>
</body>
</html>
