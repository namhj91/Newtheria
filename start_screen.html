<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <link rel="stylesheet" href="./assets/css/start_screen.css" />
</head>
<body>
  <button id="testModeEntry" class="test-mode-entry" type="button">TEST MODE</button>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>
  <div id="dragDiscardOverlay" class="drag-discard-overlay" aria-hidden="true"></div>
  <div id="discardZone" class="discard-dropzone" aria-hidden="true">
    <span class="discard-icon" aria-hidden="true">🗑️</span>
    <span class="discard-label">DISCARD</span>
  </div>

  <main class="screen">
    <header class="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="fan-zone" aria-label="시작 카드 선택지">
      <div class="card-fan-wrap center">
        <div class="card-fan" id="menu"></div>
      </div>
    </section>

    <footer class="meta">
      <button id="easterEgg" type="button">ver.loading...</button>
    </footer>
  </main>

  <script src="./assets/js/card_templates.js"></script>
  <script src="./assets/js/character_data_utils.js"></script>
  <script src="./assets/js/start_screen.js"></script>
</body>
</html>
