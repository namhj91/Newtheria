<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 프롤로그</title>
  <link rel="stylesheet" href="./assets/css/prologue.css" />
</head>
<body>
  <main class="prologue-screen">
    <section class="goddess-window" aria-label="여신 모습 창">
      <div class="goddess-aura" aria-hidden="true"></div>
      <div class="goddess-avatar" role="img" aria-label="별빛 여신 실루엣"></div>
      <p id="goddessName" class="goddess-name">별의 여신 · 아스테리아</p>
    </section>

    <section class="dialogue-panel" aria-live="polite">
      <p id="dialogueText" class="dialogue-text"></p>
      <div class="dialogue-actions">
        <button id="nextDialogueButton" type="button" class="dialogue-button">다음</button>
        <button id="skipButton" type="button" class="dialogue-button skip">스킵</button>
      </div>
    </section>
  </main>

  <script src="./assets/js/dialogue_repository.js"></script>
  <script src="./assets/js/dialogue_ui.js"></script>
  <script src="./assets/js/prologue.js"></script>
</body>
</html>
