<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <style>
    :root {
      --bg-1: #080b16;
      --bg-2: #111a3b;
      --text: #e5ecff;
      --card-bg: rgba(20, 28, 60, 0.55);
      --card-border: rgba(170, 190, 255, 0.35);
      --accent: #7ea2ff;
      --dim: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #1d2e66 0%, transparent 35%),
        radial-gradient(circle at 80% 15%, #2a1f5f 0%, transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    .stars,
    .twinkle {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars::before,
    .stars::after,
    .twinkle::before,
    .twinkle::after {
      content: "";
      position: absolute;
      inset: -20%;
      background-repeat: repeat;
      background-size: 320px 320px;
      opacity: 0.45;
    }

    .stars::before {
      background-image: radial-gradient(circle, rgba(236, 243, 255, 0.9) 1px, transparent 2px);
      animation: drift 70s linear infinite;
    }

    .stars::after {
      background-image: radial-gradient(circle, rgba(173, 198, 255, 0.85) 1.4px, transparent 2.2px);
      animation: drift 95s linear infinite reverse;
      opacity: 0.4;
    }

    .twinkle::before {
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.95) 1px, transparent 2px);
      filter: blur(0.3px);
      animation: pulse 5s ease-in-out infinite;
    }

    .twinkle::after {
      background-image: radial-gradient(circle, rgba(144, 180, 255, 0.85) 1px, transparent 2px);
      animation: pulse 8s ease-in-out infinite reverse;
      opacity: 0.55;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 56px 24px 24px;
      gap: 36px;
      place-items: center;
    }

    .logo {
      text-align: center;
      text-shadow: 0 0 22px rgba(110, 151, 255, 0.7);
    }

    .logo h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4rem);
      letter-spacing: 0.12em;
      font-weight: 800;
    }

    .logo p {
      margin: 8px 0 0;
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      opacity: 0.8;
      letter-spacing: 0.15em;
    }

    .menu {
      width: min(920px, 95vw);
      display: grid;
      grid-template-columns: repeat(2, minmax(230px, 1fr));
      gap: 18px;
    }

    .menu button {
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text);
      padding: 26px;
      min-height: 120px;
      border-radius: 18px;
      text-align: left;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .menu button .title {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .menu button .desc {
      opacity: 0.78;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .menu button:hover,
    .menu button:focus-visible {
      transform: translateY(-3px) scale(1.02);
      border-color: rgba(185, 205, 255, 0.9);
      box-shadow: 0 0 20px rgba(126, 162, 255, 0.45), 0 14px 30px rgba(0, 0, 0, 0.25);
      outline: none;
    }

    .menu.selected button:not(.active) {
      opacity: 0.4;
      filter: saturate(0.7);
    }

    .menu button.active {
      transform: scale(1.035);
      border-color: rgba(204, 221, 255, 1);
      box-shadow: 0 0 30px rgba(126, 162, 255, 0.55), 0 14px 30px rgba(0, 0, 0, 0.3);
    }

    .version {
      justify-self: end;
      align-self: end;
      margin-right: 4px;
      opacity: 0.75;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .version:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .hint {
      position: fixed;
      bottom: 56px;
      right: 26px;
      font-size: 0.85rem;
      color: rgba(225, 236, 255, 0.86);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.24s ease, transform 0.24s ease;
      pointer-events: none;
    }

    .hint.show {
      opacity: 1;
      transform: translateY(0);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: transparent;
      pointer-events: none;
      transition: background 0.35s ease;
    }

    .overlay.play {
      background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, var(--dim) 65%);
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-260px, -160px, 0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.42; }
      50% { opacity: 0.9; }
    }

    @media (max-width: 680px) {
      .menu {
        grid-template-columns: 1fr;
      }

      .container {
        padding-top: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="container">
    <header class="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="menu" id="menu" aria-label="시작 메뉴">
      <button type="button" data-route="new-game">
        <span class="title">새로운 여정</span>
        <span class="desc">새 세계에서 첫 발걸음을 내딛습니다.</span>
      </button>
      <button type="button" data-route="continue">
        <span class="title">어떤 모험가의 일지</span>
        <span class="desc">기록된 운명을 이어서 탐험합니다.</span>
      </button>
      <button type="button" data-route="codex">
        <span class="title">대륙견문록</span>
        <span class="desc">세계관, 인물, 전승을 열람합니다.</span>
      </button>
      <button type="button" data-route="mods">
        <span class="title">신의 섭리</span>
        <span class="desc">모드와 규칙을 조정합니다.</span>
      </button>
    </section>

    <footer class="version" id="version">ver.0.0.21(260329-인덱스진입페이지추가)</footer>
  </main>

  <div class="hint" id="hint" role="status" aria-live="polite"></div>

  <script>
    const menu = document.getElementById("menu");
    const hint = document.getElementById("hint");
    const overlay = document.querySelector(".overlay");
    const version = document.getElementById("version");

    menu.addEventListener("click", (event) => {
      const target = event.target.closest("button");
      if (!target) return;

      menu.classList.add("selected");
      menu.querySelectorAll("button").forEach((button) => button.classList.remove("active"));
      target.classList.add("active");
      overlay.classList.add("play");

      hint.textContent = `선택: ${target.querySelector(".title").textContent} · 전환 연출 준비 중`;
      hint.classList.add("show");

      setTimeout(() => {
        overlay.classList.remove("play");
      }, 650);
    });

    version.addEventListener("click", () => {
      menu.animate(
        [
          { transform: "translateY(0) scale(1)", filter: "hue-rotate(0deg)" },
          { transform: "translateY(-4px) scale(1.01)", filter: "hue-rotate(24deg)" },
          { transform: "translateY(0) scale(1)", filter: "hue-rotate(0deg)" }
        ],
        { duration: 620, easing: "ease-in-out" }
      );

      hint.textContent = "이스터에그: 카드 셔플 연출이 실행되었습니다.";
      hint.classList.add("show");

      window.clearTimeout(window.__hintTimer);
      window.__hintTimer = window.setTimeout(() => {
        hint.classList.remove("show");
      }, 1700);
    });
  </script>
</body>
</html>
