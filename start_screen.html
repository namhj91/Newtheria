<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <style>
    :root {
      --bg-1: #070b17;
      --bg-2: #16254e;
      --text: #e9efff;
      --card-w: min(22vw, 220px);
      --card-ratio: 1 / 1.618;
      --fan-gap: 92px;
      --fan-tilt: 13deg;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(62, 99, 196, 0.3), transparent 35%),
        radial-gradient(circle at 82% 10%, rgba(107, 59, 199, 0.22), transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }
    .stars, .twinkle, .overlay { position: fixed; inset: 0; pointer-events: none; }
    .stars::before, .stars::after, .twinkle::before, .twinkle::after {
      content: ""; position: absolute; inset: -20%; background-repeat: repeat; background-size: 300px 300px;
    }
    .stars::before { background-image: radial-gradient(circle, rgba(234, 243, 255, .9) 1px, transparent 2px); animation: drift 70s linear infinite; }
    .stars::after { background-image: radial-gradient(circle, rgba(146, 181, 255, .9) 1.2px, transparent 2px); animation: drift 95s linear infinite reverse; opacity: .45; }
    .twinkle::before { background-image: radial-gradient(circle, rgba(255, 255, 255, .9) 1px, transparent 2px); animation: pulse 5s ease-in-out infinite; }
    .twinkle::after { background-image: radial-gradient(circle, rgba(145, 179, 255, .7) 1px, transparent 2px); animation: pulse 8s ease-in-out infinite reverse; opacity: .55; }

    .screen { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; padding: 44px 24px 18px; }
    .logo { text-align: center; text-shadow: 0 0 24px rgba(136, 170, 255, .6); }
    .logo h1 { margin: 0; letter-spacing: .12em; font-size: clamp(2rem, 5.4vw, 4rem); }
    .logo p { margin: 10px 0 0; opacity: .8; letter-spacing: .12em; font-size: clamp(.82rem, 1.6vw, 1rem); }

    .fan-zone { position: relative; display: grid; place-items: center; }
    .menu {
      position: relative;
      width: min(980px, 96vw);
      height: min(62vh, 480px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      position: absolute;
      width: var(--card-w);
      aspect-ratio: var(--card-ratio);
      border: 0;
      padding: 0;
      background: transparent;
      text-align: left;
      cursor: grab;
      transform-origin: 50% 50%;
      transition: box-shadow .25s ease, filter .25s ease, opacity .25s ease;
      perspective: 1200px;
      will-change: transform;
    }
    .card:active { cursor: grabbing; }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .4s ease;
      pointer-events: none;
    }
    .card.is-back .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      border: 1px solid rgba(180, 202, 255, .6);
      backface-visibility: hidden;
      overflow: hidden;
    }
    .card-face::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(184, 205, 255, 0.2);
      pointer-events: none;
    }
    .card-front {
      background: linear-gradient(165deg, rgba(30, 43, 88, 1), rgba(18, 27, 57, 1));
      color: var(--text);
      padding: 18px 16px;
    }
    .card-back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 50% 50%, rgba(181, 206, 255, .26), transparent 46%),
        repeating-linear-gradient(45deg, rgba(157, 188, 255, .14) 0 8px, rgba(83, 108, 172, .12) 8px 16px),
        linear-gradient(165deg, rgba(16, 24, 54, 1), rgba(10, 16, 35, 1));
    }
    .card-back::before {
      content: "✦";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 2.8rem;
      color: rgba(211, 227, 255, .82);
      text-shadow: 0 0 18px rgba(167, 199, 255, .5);
    }
    .card-content { position: relative; z-index: 1; }
    .card .icon {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: rgba(124, 159, 234, .2);
      border: 1px solid rgba(191, 214, 255, .35);
      font-size: 1.15rem;
    }
    .card .label { display: block; font-size: 1.08rem; font-weight: 700; margin-bottom: 10px; }
    .card .desc { font-size: .89rem; line-height: 1.45; opacity: .84; }

    .card:hover, .card:focus-visible {
      box-shadow: 0 0 26px rgba(127,162,255,.45), 0 16px 28px rgba(0,0,0,.3);
      outline: none;
      z-index: 10;
    }

    .menu.selecting .card:not(.active) { opacity: .32; filter: saturate(.65); }
    .menu.selecting .card.active {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) translateY(-18px) scale(1.07);
      box-shadow: 0 0 30px rgba(145,183,255,.52), 0 16px 30px rgba(0,0,0,.35);
      z-index: 11;
    }

    .menu.rerolling .card { pointer-events: none; }

    .meta {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-size: .86rem;
      opacity: .9;
    }
    .meta button {
      border: 0;
      color: #dbe6ff;
      background: transparent;
      cursor: pointer;
      padding: 4px 2px;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      white-space: normal;
      text-align: center;
      max-width: 100%;
    }


    .overlay.play { background: radial-gradient(circle at center, rgba(255,255,255,.09) 0, rgba(3,7,18,.58) 70%); }

    @keyframes drift { from { transform: translate3d(0,0,0);} to { transform: translate3d(-240px,-170px,0);} }
    @keyframes pulse { 0%,100%{opacity:.38;} 50%{opacity:.92;} }

    @media (max-width: 760px) {
      :root { --card-w: min(38vw, 184px); --fan-gap: 52px; --fan-tilt: 9deg; }
      .menu { height: min(58vh, 420px); }
      .screen { padding: 34px 14px 12px; }
      .meta { font-size: .8rem; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="screen">
    <header class="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="fan-zone" aria-label="시작 카드 선택지">
      <div class="menu" id="menu">
        <button class="card" type="button" data-route="new"><span class="card-inner"><span class="card-face card-front"><span class="card-content"><span class="icon" aria-hidden="true">🧭</span><span class="label">새로운 여정</span><span class="desc">처음부터 새로운 세계를 시작합니다.</span></span></span><span class="card-face card-back" aria-hidden="true"></span></span></button>
        <button class="card" type="button" data-route="continue"><span class="card-inner"><span class="card-face card-front"><span class="card-content"><span class="icon" aria-hidden="true">📜</span><span class="label">어떤 모험가의 일지</span><span class="desc">기록된 여정을 이어서 진행합니다.</span></span></span><span class="card-face card-back" aria-hidden="true"></span></span></button>
        <button class="card" type="button" data-route="codex"><span class="card-inner"><span class="card-face card-front"><span class="card-content"><span class="icon" aria-hidden="true">🌍</span><span class="label">대륙견문록</span><span class="desc">인물·지리·전승 문서를 열람합니다.</span></span></span><span class="card-face card-back" aria-hidden="true"></span></span></button>
        <button class="card" type="button" data-route="mods"><span class="card-inner"><span class="card-face card-front"><span class="card-content"><span class="icon" aria-hidden="true">⚙️</span><span class="label">신의 섭리</span><span class="desc">모드 및 확장 규칙을 조정합니다.</span></span></span><span class="card-face card-back" aria-hidden="true"></span></span></button>
      </div>
    </section>

    <footer class="meta">
      <button id="easterEgg" type="button">ver.0.0.28(260329-카드셔플드래그연출개선)</button>
    </footer>
  </main>


  <script>
    const menu = document.getElementById('menu');
    const cards = [...menu.querySelectorAll('.card')];
    const overlay = document.querySelector('.overlay');
    const eggButton = document.getElementById('easterEgg');

    let isDragging = false;
    const dragState = { card: null, startX: 0, startY: 0, pointerId: null };

    const getCardTransform = (card) => {
      const tx = card.style.getPropertyValue('--tx') || '0px';
      const ty = card.style.getPropertyValue('--ty') || '0px';
      const rot = card.style.getPropertyValue('--rot') || '0deg';
      return `translate(${tx}, ${ty}) rotate(${rot})`;
    };

    const layoutCards = () => {
      const mid = (cards.length - 1) / 2;
      cards.forEach((card, i) => {
        const offset = i - mid;
        const tx = offset * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fan-gap'));
        const ty = Math.abs(offset) * 14;
        const rot = offset * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fan-tilt'));
        card.style.setProperty('--tx', `${tx}px`);
        card.style.setProperty('--ty', `${ty}px`);
        card.style.setProperty('--rot', `${rot}deg`);
        card.style.transform = getCardTransform(card);
      });
    };


    menu.addEventListener('click', (e) => {
      const card = e.target.closest('.card');
      if (!card || menu.classList.contains('rerolling') || isDragging) return;
      menu.classList.add('selecting');
      cards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      overlay.classList.add('play');
      setTimeout(() => overlay.classList.remove('play'), 620);
    });

    const playReroll = async () => {
      if (menu.classList.contains('rerolling')) return;
      menu.classList.remove('selecting');
      cards.forEach(c => c.classList.remove('active'));
      menu.classList.add('rerolling');

      const centerStack = (i) => `translate(${(i - 1.5) * 6}px, 0px) rotate(0deg)`;

      // 1) 가운데로 모으기
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: getCardTransform(card) },
        { transform: centerStack(i) }
      ], { duration: 280, easing: 'ease-in-out' }).finished));

      // 2) 카드 뭉치 뒤집기
      cards.forEach((card) => card.classList.toggle('is-back'));
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: centerStack(i) },
        { transform: `${centerStack(i)} rotateY(180deg)` }
      ], { duration: 240, easing: 'ease-in-out' }).finished));

      // 3) 각 카드가 중심축 기준으로 3회전 (시계/반시계)
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: centerStack(i) },
        { transform: `translate(${(i - 1.5) * 10}px, -8px) rotate(${i % 2 === 0 ? 1080 : -1080}deg)` },
        { transform: centerStack(i) }
      ], { duration: 700, easing: 'cubic-bezier(.35,.01,.25,1)' }).finished));

      // 4) 각자 자리로 복귀
      layoutCards();
      await Promise.all(cards.map((card, i) => card.animate([
        { transform: centerStack(i) },
        { transform: getCardTransform(card) }
      ], { duration: 250 + i * 40, easing: 'ease-out' }).finished));

      // 5) 한 장씩 다시 앞면으로 뒤집기
      for (const card of cards) {
        card.classList.remove('is-back');
        // eslint-disable-next-line no-await-in-loop
        await card.animate(
          [{ transform: getCardTransform(card) }, { transform: `${getCardTransform(card)} rotateY(180deg)` }],
          { duration: 180, easing: 'ease-in-out' }
        ).finished;
      }

      menu.classList.remove('rerolling');
    };

    const onPointerMove = (e) => {
      if (!dragState.card || e.pointerId !== dragState.pointerId) return;
      const dx = e.clientX - dragState.startX;
      const dy = e.clientY - dragState.startY;
      if (Math.hypot(dx, dy) > 4) isDragging = true;
      dragState.card.style.transform = `${getCardTransform(dragState.card)} translate(${dx}px, ${dy}px)`;
    };

    const endDrag = () => {
      if (!dragState.card) return;
      const card = dragState.card;
      card.releasePointerCapture(dragState.pointerId);
      card.animate([
        { transform: card.style.transform },
        { transform: getCardTransform(card) }
      ], { duration: 320, easing: 'cubic-bezier(.15,.8,.2,1)' });
      card.style.transform = getCardTransform(card);
      dragState.card = null;
      dragState.pointerId = null;
      setTimeout(() => { isDragging = false; }, 40);
    };

    cards.forEach((card) => {
      card.addEventListener('pointerdown', (e) => {
        if (menu.classList.contains('rerolling')) return;
        dragState.card = card;
        dragState.pointerId = e.pointerId;
        dragState.startX = e.clientX;
        dragState.startY = e.clientY;
        isDragging = false;
        card.setPointerCapture(e.pointerId);
      });
      card.addEventListener('pointermove', onPointerMove);
      card.addEventListener('pointerup', endDrag);
      card.addEventListener('pointercancel', endDrag);
    });

    eggButton.addEventListener('click', playReroll);
    window.addEventListener('resize', layoutCards);
    layoutCards();
  </script>
</body>
</html>
