<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newtheria 시작 화면</title>
  <style>
    :root {
      --bg-1: #070b17;
      --bg-2: #16254e;
      --text: #e9efff;
      --card-w: min(22vw, 220px);
      --card-ratio: 1 / 1.618;
      --fan-gap: 92px;
      --fan-tilt: 13deg;
      --version: "ver.0.0.1(260329-카드연출개편)";
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(62, 99, 196, 0.3), transparent 35%),
        radial-gradient(circle at 82% 10%, rgba(107, 59, 199, 0.22), transparent 30%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    .stars, .twinkle, .constellation, .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars::before, .stars::after, .twinkle::before, .twinkle::after {
      content: "";
      position: absolute;
      inset: -20%;
      background-repeat: repeat;
      background-size: 300px 300px;
    }

    .stars::before {
      background-image: radial-gradient(circle, rgba(234, 243, 255, .9) 1px, transparent 2px);
      animation: drift 70s linear infinite;
    }

    .stars::after {
      background-image: radial-gradient(circle, rgba(146, 181, 255, .9) 1.2px, transparent 2px);
      animation: drift 95s linear infinite reverse;
      opacity: .45;
    }

    .twinkle::before {
      background-image: radial-gradient(circle, rgba(255, 255, 255, .9) 1px, transparent 2px);
      animation: pulse 5s ease-in-out infinite;
    }

    .twinkle::after {
      background-image: radial-gradient(circle, rgba(145, 179, 255, .7) 1px, transparent 2px);
      animation: pulse 8s ease-in-out infinite reverse;
      opacity: .55;
    }

    .constellation {
      opacity: .45;
      filter: drop-shadow(0 0 8px rgba(144, 189, 255, .45));
    }

    .constellation path {
      stroke: rgba(163, 198, 255, .35);
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: constellationLine 8s ease-in-out infinite;
    }

    .constellation circle {
      fill: rgba(228, 240, 255, .9);
      animation: constellationStar 4.6s ease-in-out infinite;
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 44px 24px 18px;
    }

    .logo {
      text-align: center;
      text-shadow: 0 0 24px rgba(136, 170, 255, .6);
      user-select: none;
    }

    .logo h1 {
      margin: 0;
      letter-spacing: .12em;
      font-size: clamp(2rem, 5.4vw, 4rem);
    }

    .logo p {
      margin: 10px 0 0;
      opacity: .8;
      letter-spacing: .12em;
      font-size: clamp(.82rem, 1.6vw, 1rem);
    }

    .fan-zone {
      position: relative;
      display: grid;
      place-items: center;
    }

    .menu {
      position: relative;
      width: min(980px, 96vw);
      height: min(62vh, 480px);
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
    }

    .card {
      position: absolute;
      width: var(--card-w);
      aspect-ratio: var(--card-ratio);
      transform-origin: 50% 86%;
      transform-style: preserve-3d;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: grab;
      touch-action: none;
      user-select: none;
      transition: filter .25s ease, opacity .25s ease;
    }

    .card:active { cursor: grabbing; }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      overflow: hidden;
      border: 1px solid rgba(180, 202, 255, .62);
      box-shadow: 0 14px 26px rgba(0, 0, 0, .34);
    }

    .face.front {
      background: linear-gradient(165deg, rgba(36, 52, 106, .98), rgba(18, 28, 60, .96));
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 18px 16px;
      text-align: left;
      gap: 12px;
    }

    .face.front::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      border: 1px solid rgba(184, 205, 255, 0.25);
      pointer-events: none;
    }

    .face.back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 20% 18%, rgba(160, 198, 255, .18), transparent 38%),
        radial-gradient(circle at 82% 84%, rgba(132, 161, 255, .17), transparent 35%),
        linear-gradient(150deg, rgba(20, 33, 73, .98), rgba(15, 23, 49, .95));
    }

    .face.back::before,
    .face.back::after {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 12px;
      border: 1px solid rgba(174, 206, 255, .28);
    }

    .face.back::after {
      inset: 26px;
      border-style: dashed;
      border-color: rgba(174, 206, 255, .24);
    }

    .glyph {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.25rem;
      color: #f4f8ff;
      background: radial-gradient(circle at 30% 30%, rgba(245, 250, 255, .3), rgba(137, 172, 255, .26));
      border: 1px solid rgba(204, 223, 255, .55);
      box-shadow: 0 0 16px rgba(149, 186, 255, .28);
    }

    .label {
      display: block;
      font-size: 1.08rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .desc {
      font-size: .89rem;
      line-height: 1.45;
      opacity: .84;
    }

    .menu.selecting .card:not(.active) { opacity: .34; filter: saturate(.65); }
    .menu.selecting .card.active { filter: brightness(1.08); }
    .menu.rerolling .card { pointer-events: none; }

    .version {
      position: fixed;
      right: 12px;
      bottom: 10px;
      z-index: 2;
      font-size: clamp(.66rem, 1.9vw, .85rem);
      color: rgba(230, 239, 255, .88);
      letter-spacing: .02em;
      background: rgba(10, 15, 31, .45);
      border: 1px solid rgba(146, 176, 255, .32);
      border-radius: 999px;
      padding: 6px 10px;
      backdrop-filter: blur(3px);
      white-space: nowrap;
      max-width: min(94vw, 460px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .overlay.play {
      background: radial-gradient(circle at center, rgba(255,255,255,.09) 0, rgba(3,7,18,.58) 70%);
    }

    @keyframes drift { from { transform: translate3d(0,0,0);} to { transform: translate3d(-240px,-170px,0);} }
    @keyframes pulse { 0%,100%{opacity:.38;} 50%{opacity:.92;} }

    @keyframes constellationLine {
      0%, 10% { stroke-dashoffset: 300; opacity: 0; }
      35%, 70% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: -200; opacity: .15; }
    }

    @keyframes constellationStar {
      0%, 100% { opacity: .4; transform: scale(.8); }
      45% { opacity: 1; transform: scale(1.25); }
    }

    @media (max-width: 760px) {
      :root { --card-w: min(38vw, 184px); --fan-gap: 52px; --fan-tilt: 9deg; }
      .menu { height: min(58vh, 420px); }
      .screen { padding-top: 36px; }
      .version {
        right: 8px;
        left: 8px;
        max-width: none;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="twinkle" aria-hidden="true"></div>
  <svg class="constellation" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <path d="M8 74 L20 58 L34 62 L46 46 L58 52 L72 34 L89 40" />
    <path d="M12 22 L24 30 L36 24 L47 34 L63 28 L74 40 L88 30" />
    <circle cx="8" cy="74" r="0.8" /><circle cx="20" cy="58" r="1" /><circle cx="34" cy="62" r="0.9" />
    <circle cx="46" cy="46" r="1" /><circle cx="58" cy="52" r="0.85" /><circle cx="72" cy="34" r="1" />
    <circle cx="89" cy="40" r="0.9" /><circle cx="12" cy="22" r="0.9" /><circle cx="24" cy="30" r="0.8" />
    <circle cx="36" cy="24" r="1" /><circle cx="47" cy="34" r="0.85" /><circle cx="63" cy="28" r="1" />
    <circle cx="74" cy="40" r="0.9" /><circle cx="88" cy="30" r="1" />
  </svg>
  <div class="overlay" aria-hidden="true"></div>

  <main class="screen">
    <header class="logo" id="logo">
      <h1>NEWTHERIA</h1>
      <p>THE STARS AWAIT YOUR JOURNEY</p>
    </header>

    <section class="fan-zone" aria-label="시작 카드 선택지">
      <div class="menu" id="menu">
        <button class="card" type="button" data-route="new">
          <span class="face front"><span class="glyph">✦</span><span><span class="label">새로운 여정</span><span class="desc">처음부터 새로운 세계를 시작합니다.</span></span></span>
          <span class="face back" aria-hidden="true"></span>
        </button>
        <button class="card" type="button" data-route="continue">
          <span class="face front"><span class="glyph">✧</span><span><span class="label">어떤 모험가의 일지</span><span class="desc">기록된 여정을 이어서 진행합니다.</span></span></span>
          <span class="face back" aria-hidden="true"></span>
        </button>
        <button class="card" type="button" data-route="codex">
          <span class="face front"><span class="glyph">✶</span><span><span class="label">대륙견문록</span><span class="desc">인물·지리·전승 문서를 열람합니다.</span></span></span>
          <span class="face back" aria-hidden="true"></span>
        </button>
        <button class="card" type="button" data-route="mods">
          <span class="face front"><span class="glyph">✹</span><span><span class="label">신의 섭리</span><span class="desc">모드 및 확장 규칙을 조정합니다.</span></span></span>
          <span class="face back" aria-hidden="true"></span>
        </button>
      </div>
    </section>
  </main>

  <div class="version" id="versionInfo">ver.0.0.1(260329-카드연출개편)</div>

  <script>
    const menu = document.getElementById('menu');
    const cards = [...menu.querySelectorAll('.card')];
    const overlay = document.querySelector('.overlay');
    const logo = document.getElementById('logo');

    const getFanVars = () => {
      const style = getComputedStyle(document.documentElement);
      return {
        gap: parseFloat(style.getPropertyValue('--fan-gap')),
        tilt: parseFloat(style.getPropertyValue('--fan-tilt'))
      };
    };

    const layoutCards = () => {
      const mid = (cards.length - 1) / 2;
      const { gap, tilt } = getFanVars();

      cards.forEach((card, i) => {
        const offset = i - mid;
        const tx = offset * gap;
        const ty = Math.abs(offset) * 14;
        const rot = offset * tilt;
        card.dataset.baseTransform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
        card.style.transform = card.dataset.baseTransform;
      });
    };

    const animateAll = (factory, options) => Promise.all(
      cards.map((card, i) => card.animate(factory(card, i), { fill: 'forwards', ...options }).finished)
    );

    const playReroll = async () => {
      if (menu.classList.contains('rerolling')) return;
      menu.classList.remove('selecting');
      cards.forEach(c => c.classList.remove('active'));
      menu.classList.add('rerolling');
      overlay.classList.add('play');

      const stackTransform = 'translate(0px, 0px) rotate(0deg)';

      await animateAll((card) => [
        { transform: card.style.transform },
        { transform: stackTransform }
      ], { duration: 260, easing: 'ease-in' });

      await animateAll(() => [
        { transform: `${stackTransform} rotateY(0deg)` },
        { transform: `${stackTransform} rotateY(180deg)` }
      ], { duration: 220, easing: 'ease-in-out' });

      await animateAll((card, i) => {
        const direction = i % 2 === 0 ? 1 : -1;
        return [
          { transform: `${stackTransform} rotateY(180deg) rotate(0deg)` },
          { transform: `${stackTransform} rotateY(180deg) rotate(${direction * 360}deg)` },
          { transform: `${stackTransform} rotateY(180deg) rotate(${direction * 720}deg)` },
          { transform: `${stackTransform} rotateY(180deg) rotate(${direction * 1080}deg)` }
        ];
      }, { duration: 720, easing: 'ease-in-out' });

      await animateAll((card) => [
        { transform: `${stackTransform} rotateY(180deg)` },
        { transform: `${card.dataset.baseTransform} rotateY(180deg)` }
      ], { duration: 300, easing: 'cubic-bezier(.2,.8,.2,1)' });

      for (const card of cards) {
        await card.animate([
          { transform: `${card.dataset.baseTransform} rotateY(180deg)` },
          { transform: `${card.dataset.baseTransform} rotateY(0deg)` }
        ], { duration: 230, easing: 'ease-in-out', fill: 'forwards' }).finished;
      }

      overlay.classList.remove('play');
      menu.classList.remove('rerolling');
    };

    const dragState = {
      target: null,
      startX: 0,
      startY: 0,
      dx: 0,
      dy: 0,
      moved: false
    };

    const resetDraggedCard = async (card) => {
      const current = card.style.transform;
      await card.animate([
        { transform: current },
        { transform: card.dataset.baseTransform }
      ], { duration: 280, easing: 'cubic-bezier(.2,.75,.2,1)', fill: 'forwards' }).finished;
      card.style.transform = card.dataset.baseTransform;
    };

    const pointerDown = (event) => {
      if (menu.classList.contains('rerolling')) return;
      const card = event.currentTarget;
      dragState.target = card;
      dragState.startX = event.clientX;
      dragState.startY = event.clientY;
      dragState.dx = 0;
      dragState.dy = 0;
      dragState.moved = false;
      card.setPointerCapture(event.pointerId);
      card.style.transition = 'none';
      card.style.zIndex = 20;
    };

    const pointerMove = (event) => {
      const card = dragState.target;
      if (!card) return;
      dragState.dx = event.clientX - dragState.startX;
      dragState.dy = event.clientY - dragState.startY;
      if (Math.hypot(dragState.dx, dragState.dy) > 6) dragState.moved = true;
      card.style.transform = `${card.dataset.baseTransform} translate(${dragState.dx}px, ${dragState.dy}px)`;
    };

    const pointerUp = async (event) => {
      const card = dragState.target;
      if (!card) return;
      card.releasePointerCapture(event.pointerId);
      card.style.transition = '';
      await resetDraggedCard(card);
      card.style.zIndex = '';

      if (!dragState.moved) {
        menu.classList.add('selecting');
        cards.forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      }

      dragState.target = null;
    };

    cards.forEach((card) => {
      card.addEventListener('pointerdown', pointerDown);
      card.addEventListener('pointermove', pointerMove);
      card.addEventListener('pointerup', pointerUp);
      card.addEventListener('pointercancel', pointerUp);
    });

    logo.addEventListener('click', playReroll);
    window.addEventListener('resize', layoutCards);

    layoutCards();
    playReroll();
  </script>
</body>
</html>
