<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC 관계망 테스트</title>
  <link rel="stylesheet" href="./assets/css/npc_test.css" />
</head>
<body>
  <!-- 모든 테스트 페이지에서 동일한 위치(우상단)로 이동 버튼을 고정한다. -->
  <a class="test-hub-button" href="./test_mode.html" aria-label="테스트 허브로 돌아가기">← 테스트 허브</a>

  <main class="npc-test">
    <header class="npc-test__header">
      <p class="npc-test__version" id="npcVersion">ver.0.2.65(260424-npc랜덤생성가족관계팝업UI)</p>
      <h1>NPC 랜덤 생성 & 관계망 테스트</h1>
      <p>100명의 NPC를 즉시 생성하고, 리스트 클릭으로 상세 정보를 팝업에서 확인할 수 있습니다.</p>
    </header>

    <section class="npc-dashboard" aria-label="NPC 랜덤 테스트 패널">
      <article class="npc-panel npc-panel--control">
        <h2>제어 패널</h2>
        <p class="npc-panel__hint">버튼을 누르면 나이/종족 기반으로 부모-자식 관계가 자동 구성됩니다.</p>

        <div class="npc-panel__actions">
          <button id="generateNpcList" type="button">🎲 NPC 100명 다시 생성</button>
          <button id="sortByAge" type="button">나이순 정렬</button>
          <button id="sortByName" type="button">이름순 정렬</button>
        </div>

        <section class="npc-summary" id="npcSummary" aria-live="polite"></section>
      </article>

      <article class="npc-panel npc-panel--list">
        <h2>NPC 리스트</h2>
        <p class="npc-panel__hint">카드를 누르면 상세 팝업이 열립니다.</p>
        <ul id="npcList" class="npc-list" aria-label="NPC 카드 리스트"></ul>
      </article>
    </section>
  </main>

  <!-- NPC 상세 정보 팝업 -->
  <dialog id="npcDetailDialog" class="npc-dialog" aria-label="NPC 상세 정보">
    <form method="dialog" class="npc-dialog__backdrop-action">
      <button class="npc-dialog__close" aria-label="닫기">×</button>
    </form>
    <section class="npc-dialog__content">
      <h3 id="dialogNpcName">NPC 이름</h3>
      <p id="dialogNpcMeta" class="npc-dialog__meta"></p>
      <div id="dialogNpcDetail" class="npc-dialog__grid"></div>
    </section>
  </dialog>

  <script type="module" src="./assets/js/npc_test.js"></script>
</body>
</html>
