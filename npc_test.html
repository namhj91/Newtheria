<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC 테스트 리뉴얼</title>
  <link rel="stylesheet" href="./assets/css/card_templates.css" />
  <link rel="stylesheet" href="./assets/css/npc_test.css" />
</head>
<body>
  <a class="hub-link" href="./test_mode.html">← 테스트 허브</a>

  <main class="npc-app">
    <header class="hero glass">
      <div>
        <h1>NPC TEST LAB</h1>
        <p>불투명 글라스 기반 · 탭/팝업 중심 · 패밀리 트리 & 속궁합 비교</p>
      </div>
      <p class="hero__version" id="npcVersion">ver.0.2.88(260424-npc테스트창리뉴얼)</p>
    </header>

    <section class="toolbar glass" aria-label="컨트롤">
      <button id="rerollBtn" type="button">🎲 월드 리롤</button>
      <button id="compareOpenBtn" type="button">⚖️ 속궁합 비교</button>
      <button id="familyOpenBtn" type="button">🌳 가문 트리</button>
      <label class="search-wrap">
        <span>검색</span>
        <input id="searchInput" type="search" placeholder="이름 / 가문 / 종족" />
      </label>
      <select id="raceFilter" aria-label="종족 필터"></select>
      <select id="familyFilter" aria-label="가문 필터"></select>
    </section>

    <section class="content-grid">
      <aside class="panel glass" aria-label="NPC 목록">
        <div class="panel__head">
          <h2>NPC 목록</h2>
          <small id="npcCountMeta"></small>
        </div>
        <div id="npcList" class="npc-list" role="list"></div>
      </aside>

      <section class="panel glass" aria-label="프리뷰">
        <div class="tabs" role="tablist" aria-label="NPC 프리뷰 탭">
          <button class="tab is-active" data-tab="summary" role="tab">요약</button>
          <button class="tab" data-tab="cards" role="tab">카드 뷰</button>
          <button class="tab" data-tab="timeline" role="tab">관계 타임라인</button>
        </div>

        <article class="tab-panel is-active" data-panel="summary">
          <h3>선택된 NPC 요약</h3>
          <div id="selectedSummary" class="summary-empty">왼쪽에서 NPC를 선택해 주세요.</div>
        </article>

        <article class="tab-panel" data-panel="cards">
          <h3>카드 템플릿 프리뷰</h3>
          <div id="cardPreview" class="card-preview"></div>
        </article>

        <article class="tab-panel" data-panel="timeline">
          <h3>관계 타임라인</h3>
          <ul id="timelineList" class="timeline-list"></ul>
        </article>
      </section>
    </section>
  </main>

  <dialog id="npcModal" class="modal glass">
    <header>
      <h3 id="npcModalTitle">NPC 상세</h3>
      <button data-close="npcModal" type="button">닫기</button>
    </header>
    <div id="npcModalBody" class="modal-body"></div>
  </dialog>

  <dialog id="traitModal" class="modal glass small">
    <header>
      <h3 id="traitModalTitle">특성 정보</h3>
      <button data-close="traitModal" type="button">닫기</button>
    </header>
    <div id="traitModalBody" class="modal-body"></div>
  </dialog>

  <dialog id="compareModal" class="modal glass">
    <header>
      <h3>속궁합 비교</h3>
      <button data-close="compareModal" type="button">닫기</button>
    </header>
    <div class="compare-grid">
      <select id="compareA"></select>
      <select id="compareB"></select>
      <div id="compareResult" class="compare-result">두 인물을 선택해 주세요.</div>
    </div>
  </dialog>

  <dialog id="familyModal" class="modal glass wide">
    <header>
      <h3 id="familyTitle">가문 트리</h3>
      <button data-close="familyModal" type="button">닫기</button>
    </header>
    <div class="family-controls">
      <label>기준 인물 <select id="familyFocusSelect"></select></label>
    </div>
    <div id="familyTreeViewport" class="family-tree-viewport">
      <div id="familyTree" class="family-tree"></div>
    </div>
  </dialog>

  <script type="module" src="./assets/js/npc_test.js"></script>
</body>
</html>
