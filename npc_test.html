<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC 템플릿 테스트</title>
  <link rel="stylesheet" href="./assets/css/npc_test.css" />
</head>
<body>
  <!-- 모든 테스트 페이지에서 동일한 위치(우상단)로 이동 버튼을 고정한다. -->
  <a class="test-hub-button" href="./test_mode.html" aria-label="테스트 허브로 돌아가기">← 테스트 허브</a>

  <main class="npc-test">
    <header class="npc-test__header">
      <h1>NPC 템플릿 테스트</h1>
      <p>NPC 데이터 구조를 빠르게 검증하고 미리보기 UI를 점검하는 임시 페이지입니다.</p>
    </header>

    <section class="npc-test__grid" aria-label="NPC 테스트 패널">
      <article class="npc-test__panel">
        <h2>입력/로드</h2>
        <p class="npc-test__hint">`docs/13_NPC_PC_정보템플릿.md` 필드 구조를 기준으로 JSON을 넣어 테스트하세요.</p>

        <div class="npc-test__actions">
          <button id="loadNpcFromSlot" type="button">slot1의 NPC 불러오기</button>
          <button id="resetNpcTemplate" type="button">기본 템플릿 복원</button>
        </div>

        <label for="npcJsonInput">NPC JSON</label>
        <textarea id="npcJsonInput" spellcheck="false" aria-label="NPC JSON 입력"></textarea>

        <div class="npc-test__actions npc-test__actions--footer">
          <button id="renderNpc" type="button">미리보기 반영</button>
          <span id="npcStatus" role="status" aria-live="polite">준비됨</span>
        </div>
      </article>

      <article class="npc-test__panel">
        <h2>렌더 결과</h2>
        <section class="npc-card" id="npcCard" aria-live="polite">
          <h3 id="npcName">이름 없음</h3>
          <p id="npcMeta">역할/종족 정보 없음</p>
          <ul id="npcCoreInfo"></ul>

          <h4>스탯</h4>
          <ul id="npcStats"></ul>

          <h4>특성</h4>
          <p id="npcTraits">특성 정보 없음</p>

          <h4>소지품</h4>
          <p id="npcInventory">인벤토리 정보 없음</p>
        </section>
      </article>
    </section>

  </main>

  <script type="module" src="./assets/js/npc_test.js"></script>
</body>
</html>
